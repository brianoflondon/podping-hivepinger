services:
  podping-hivepinger:
    image: brianoflondon/podping-hivepinger:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: hivepinger
    ports:
      - "${BIND_HOST:-127.0.0.1}:${API_PORT:-1820}:8000"
    volumes:
      # persist the SQLite queue database on the host; the application writes
      # to /hivepinger/data relative to the working directory.
      - ./data:/hivepinger/data
    env_file:
      - .env
    command: ["python", "src/hivepinger/api.py"]
    # Healthcheck configuration to monitor the API endpoint; adjust the command and parameters as needed
    healthcheck:
      test: ["CMD", "python", "src/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - hivepinger-network


volumes:
  data:
    driver: local

networks:
  hivepinger-network:
    driver: bridge
