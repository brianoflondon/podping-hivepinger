services:
  podping-hivepinger:
    image: brianoflondon/podping-hivepinger:latest
    depends_on:
      - gossip-writer
    container_name: hivepinger
    ports:
      - "${BIND_HOST:-127.0.0.1}:${API_PORT:-1820}:8000"
    volumes:
      # persist the SQLite queue database on the host; the application writes
      # to /app/data by default, so mirror that path rather than /data
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - GOSSIP_WRITER_ENABLED=true
      - GOSSIP_WRITER_ZMQ=tcp://gossip-writer:9998
    command: []
    # Healthcheck configuration to monitor the API endpoint; adjust the command and parameters as needed
    healthcheck:
      test: ["CMD", "python", "src/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - hivepinger-network

  gossip-writer:
    container_name: gossip-writer
    image: brianoflondon/gossip-writer:latest
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    user: "1000:1000"
    # No need to expose the port if we're using this via internal docker networking;
    # the hivepinger service will connect to it directly
    # ports:
    #   - "9998:9998"
    environment:
      ZMQ_BIND_ADDR: "tcp://0.0.0.0:9998"
      IROH_SECRET_FILE: "/data/gossip/iroh.key"
      ARCHIVE_PATH: "/data/gossip/archive.db"
      IROH_NODE_KEY_FILE: "/data/gossip/iroh_node.key"
      KNOWN_PEERS_FILE: "/data/gossip/known_peers.txt"
      TRUSTED_PUBLISHERS_FILE: "/data/gossip/trusted_publishers.txt"
      BOOTSTRAP_RELAYS: "https://gossipping.org/relays.json"
    volumes:
       - ./data:/data/
    networks:
      - hivepinger-network

volumes:
  data:
    driver: local

networks:
  hivepinger-network:
    driver: bridge
